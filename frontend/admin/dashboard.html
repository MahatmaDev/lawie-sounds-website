<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Lawie Sounds</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #7c4dff; border-radius: 3px; }
    
    .table-row:hover { background-color: rgba(124, 77, 255, 0.05); }
    
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(124, 77, 255, 0.2); border-top-color: #7c4dff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .tab-active { border-bottom-color: #7c4dff !important; color: #7c4dff !important; }
    .modal-enter { animation: modalFadeIn 0.2s ease-out; }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .logo-img { transition: transform 0.3s ease; }
    .logo-img:hover { transform: scale(1.05); }
    .value-card { transition: all 0.3s ease; }
    .value-card:hover { transform: translateY(-4px); }
    .welcome-banner { background: linear-gradient(135deg, #1e1e2a 0%, #2d2d3a 100%); }
    
    /* Modal draggable styles */
    .modal-header { cursor: move; user-select: none; }
    .modal-resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; background-color: #7c4dff; border-radius: 4px 0 0 0; }
    .modal-resize-handle:hover { background-color: #6c3ce0; width: 20px; height: 20px; }
    
    /* Badge styles */
    .badge-pending { background: rgba(245,158,11,0.2); color:#f59e0b; padding:2px 8px; border-radius:999px; font-size:0.75rem; }
    .badge-confirmed { background: rgba(34,197,94,0.2); color:#22c55e; padding:2px 8px; border-radius:999px; font-size:0.75rem; }
    .badge-completed { background: rgba(59,130,246,0.2); color:#3b82f6; padding:2px 8px; border-radius:999px; font-size:0.75rem; }
    .badge-cancelled { background: rgba(239,68,68,0.2); color:#ef4444; padding:2px 8px; border-radius:999px; font-size:0.75rem; }
    
    /* Responsive table */
    @media (max-width: 768px) {
      .table-responsive { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">

  <!-- ==================== SESSION CHECK ==================== -->
  <script>
    function getTimeBasedGreeting() {
      const hour = new Date().getHours();
      if (hour < 12) return { text: "Good Morning ☀️", emoji: "🌅" };
      if (hour < 17) return { text: "Good Afternoon 🌤️", emoji: "☀️" };
      if (hour < 21) return { text: "Good Evening 🌙", emoji: "✨" };
      return { text: "Good Night 🌟", emoji: "🌙" };
    }

    function checkAdminSession() {
      let session = localStorage.getItem('lawie_admin_session');
      if (!session) session = sessionStorage.getItem('lawie_admin_session');
      if (!session) { window.location.href = 'login.html'; return false; }
      try {
        const sessionData = JSON.parse(atob(session));
        if (sessionData.expires < Date.now()) {
          localStorage.removeItem('lawie_admin_session');
          sessionStorage.removeItem('lawie_admin_session');
          window.location.href = 'login.html';
          return false;
        }
        const greeting = getTimeBasedGreeting();
        sessionStorage.setItem('adminName', sessionData.name || 'Administrator');
        sessionStorage.setItem('adminGreeting', greeting.text);
        sessionStorage.setItem('adminEmoji', greeting.emoji);
        return true;
      } catch (e) { window.location.href = 'login.html'; return false; }
    }
    checkAdminSession();
  </script>

  <!-- ==================== HEADER ==================== -->
  <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-40">
    <div class="px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <img src="/IMAGES/LOGO/2.jpg" alt="Logo" class="logo-img w-10 h-10 rounded-full border-2 border-purple-500 object-cover">
        <div><h1 class="text-lg sm:text-xl font-bold">LAWIE <span class="text-purple-400">SOUNDS</span></h1><p class="text-xs text-gray-400">Admin Dashboard</p></div>
      </div>
      <div class="flex gap-2 sm:gap-3">
        <div class="bg-gray-800 rounded-xl px-2 sm:px-4 py-2 text-center min-w-[50px] sm:min-w-[70px]"><p class="text-xl sm:text-2xl font-bold text-purple-400" id="statEvents">0</p><p class="text-xs text-gray-400">Events</p></div>
        <div class="bg-gray-800 rounded-xl px-2 sm:px-4 py-2 text-center min-w-[50px] sm:min-w-[70px]"><p class="text-xl sm:text-2xl font-bold text-purple-400" id="statBookings">0</p><p class="text-xs text-gray-400">Bookings</p></div>
        <div class="bg-gray-800 rounded-xl px-2 sm:px-4 py-2 text-center min-w-[50px] sm:min-w-[70px]"><p class="text-xl sm:text-2xl font-bold text-purple-400" id="statGallery">0</p><p class="text-xs text-gray-400">Images</p></div>
        <div class="bg-gray-800 rounded-xl px-2 sm:px-4 py-2 text-center min-w-[50px] sm:min-w-[70px]"><p class="text-xl sm:text-2xl font-bold text-purple-400" id="statReviews">0</p><p class="text-xs text-gray-400">Reviews</p></div>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <a href="../index.html" target="_blank" rel="noopener" class="bg-green-800 hover:bg-green-700 px-3 sm:px-4 py-2 rounded-lg transition flex items-center gap-2 text-green-300 text-sm font-medium">
          <i class="fas fa-external-link-alt"></i> <span class="hidden sm:inline">View Site</span>
        </a>
        <button id="notifBtn" class="relative bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-lg transition" title="Pending actions — click to view bookings">
          <i class="fas fa-bell text-gray-300"></i>
          <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full items-center justify-center font-bold leading-none">0</span>
        </button>
        <div class="text-right hidden sm:block"><p class="text-xs text-gray-400" id="adminGreetingDisplay">Welcome</p><p class="text-sm font-semibold" id="adminNameDisplay">Administrator</p></div>
        <button id="logoutBtn" class="bg-gray-800 hover:bg-gray-700 px-3 sm:px-4 py-2 rounded-lg transition flex items-center gap-2"><i class="fas fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span></button>
      </div>
    </div>
    <div class="px-4 sm:px-6 border-t border-gray-800 flex flex-wrap gap-1 overflow-x-auto">
      <button data-tab="dashboard" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">📊 Dashboard</button>
      <button data-tab="events" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">📅 Events</button>
      <button data-tab="services" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">🎧 Services</button>
      <button data-tab="gallery" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">🖼️ Gallery</button>
      <button data-tab="reviews" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">⭐ Reviews</button>
      <button data-tab="marketing" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">📢 Marketing</button>
      <button data-tab="posters" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">🖼️ Posters</button>
      <button data-tab="bookings" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">📋 Bookings</button>
      <button data-tab="employees" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">👥 Employees</button>
      <button data-tab="payroll" class="tab-btn px-3 sm:px-5 py-3 text-xs sm:text-sm font-medium hover:text-purple-400 transition border-b-2 border-transparent whitespace-nowrap">💰 Payroll</button>
    </div>
  </header>

  <main class="p-4 sm:p-6"><div id="sectionContent" class="fade-in"><div class="flex justify-center py-12"><div class="spinner"></div></div></div></main>

  <!-- Modal -->
  <div id="formModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4" onclick="if(event.target===this) closeModal()">
    <div class="bg-gray-900 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-hidden border border-gray-800 modal-enter relative">
      <div class="sticky top-0 bg-gray-900 px-6 py-4 border-b border-gray-800 flex justify-between items-center modal-header">
        <h3 id="modalTitle" class="text-xl font-bold">Add Item</h3>
        <button id="closeModalBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
      </div>
      <div class="overflow-y-auto" style="max-height: calc(90vh - 120px);"><form id="modalForm" class="p-6 space-y-4"></form></div>
      <div class="px-6 py-4 border-t border-gray-800 flex justify-end gap-3">
        <button id="cancelModalBtn" class="px-4 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">Cancel</button>
        <button id="saveModalBtn" class="px-4 py-2 bg-purple-600 rounded-lg hover:bg-purple-700 transition">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== DATA STORE ====================
    let store = {
      events: [],
      gallery: [],
      reviews: [],
      marketingBanners: [],
      bookings: [],
      employees: [],
      services: [],
      payroll: [],
      posters: []
    };

    let currentTab = 'dashboard';
    let currentEditId = null;
    let bookingsChart = null;

    // ==================== API HELPERS ====================
    function getAdminToken() {
      return localStorage.getItem('lawie_admin_session') || sessionStorage.getItem('lawie_admin_session') || '';
    }

    async function apiRequest(method, path, body = null) {
      try {
        const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAdminToken()}` } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        const json = await res.json().catch(() => null);
        if (!res.ok) return { _error: true, status: res.status, message: json?.error || res.statusText };
        return json;
      } catch(e) { return { _error: true, status: 0, message: 'Network error — cannot reach API' }; }
    }

    async function loadAllDataFromAPI() {
      const [evts, svcs, gal, revs, bans, posts, bkgs, emps, pay] = await Promise.all([
        apiRequest('GET', '/api/admin/events'),
        apiRequest('GET', '/api/admin/services'),
        apiRequest('GET', '/api/admin/gallery'),
        apiRequest('GET', '/api/admin/reviews'),
        apiRequest('GET', '/api/admin/banners'),
        apiRequest('GET', '/api/admin/posters'),
        apiRequest('GET', '/api/admin/bookings'),
        apiRequest('GET', '/api/admin/employees'),
        apiRequest('GET', '/api/admin/payroll'),
      ]);
      store.events = evts?.data || [];
      store.services = svcs?.data || [];
      store.gallery = gal?.data || [];
      store.reviews = revs?.data || [];
      store.marketingBanners = bans?.data || [];
      store.posters = posts?.data || [];
      store.bookings = bkgs?.data || [];
      store.employees = emps?.data || [];
      store.payroll = pay?.data || [];
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    function updateStats() { document.getElementById('statEvents').textContent = store.events.length; document.getElementById('statBookings').textContent = store.bookings.filter(b => b.status === 'pending').length; document.getElementById('statGallery').textContent = store.gallery.length; document.getElementById('statReviews').textContent = store.reviews.filter(r => !r.isApproved).length; }
    function updateGreetingDisplay() { const greeting = sessionStorage.getItem('adminGreeting') || 'Welcome'; const emoji = sessionStorage.getItem('adminEmoji') || '👋'; const adminName = sessionStorage.getItem('adminName') || 'Administrator'; document.getElementById('adminGreetingDisplay').textContent = `${greeting} ${emoji}`; document.getElementById('adminNameDisplay').textContent = adminName; }

    function showToast(message, type = 'info') {
      const colors = { info: 'bg-blue-600', success: 'bg-green-600', booking: 'bg-purple-600', review: 'bg-yellow-600' };
      const icons = { info: 'fa-info-circle', success: 'fa-check-circle', booking: 'fa-calendar-check', review: 'fa-star' };
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 z-50 ' + (colors[type] || colors.info) + ' text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 max-w-sm fade-in';
      toast.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i><span>' + message + '</span>';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function updateNotifBadge() {
      const pending = store.bookings.filter(b => b.status === 'pending').length + store.reviews.filter(r => !r.isApproved).length;
      const badge = document.getElementById('notifBadge');
      if (!badge) return;
      if (pending > 0) { badge.textContent = pending > 9 ? '9+' : pending; badge.classList.remove('hidden'); badge.classList.add('flex'); }
      else { badge.classList.add('hidden'); badge.classList.remove('flex'); }
    }

    async function refreshLiveData() {
      const prevBookings = store.bookings.length;
      const prevPendingRevs = store.reviews.filter(r => !r.isApproved).length;
      await loadAllDataFromAPI();
      updateStats();
      updateNotifBadge();
      const newBookings = store.bookings.length - prevBookings;
      const newPendingRevs = store.reviews.filter(r => !r.isApproved).length - prevPendingRevs;
      if (newBookings > 0) showToast(newBookings + ' new booking request' + (newBookings > 1 ? 's' : '') + '!', 'booking');
      if (newPendingRevs > 0) showToast(newPendingRevs + ' new review' + (newPendingRevs > 1 ? 's' : '') + ' awaiting approval!', 'review');
      if (newBookings > 0 || newPendingRevs > 0) {
        if (currentTab === 'dashboard') renderDashboard();
        else if (currentTab === 'bookings' && newBookings > 0) renderBookings();
        else if (currentTab === 'reviews' && newPendingRevs > 0) renderReviews();
      }
      const indicator = document.getElementById('lastRefreshed');
      if (indicator) indicator.textContent = 'Updated: ' + new Date().toLocaleTimeString();
    }

    function startAutoRefresh() { setInterval(refreshLiveData, 30000); }

    // ==================== DASHBOARD ====================
    function renderDashboard() {
      const container = document.getElementById('sectionContent');
      const recentBookings = store.bookings.slice(0, 5);
      const pendingReviews = store.reviews.filter(r => !r.isApproved);
      const totalEstimatedValue = store.bookings.reduce((sum, b) => { const budgets = { '10k-30k': 20000, '30k-50k': 40000, '50k-100k': 75000, '100k-200k': 150000, '200k+': 250000 }; return sum + (budgets[b.budget] || 0); }, 0);
      const confirmedBookings = store.bookings.filter(b => ['confirmed','completed'].includes(b.status)).length;
      const convRate = store.bookings.length > 0 ? Math.round((confirmedBookings / store.bookings.length) * 100) : 0;
      const greeting = sessionStorage.getItem('adminGreeting') || 'Welcome'; const emoji = sessionStorage.getItem('adminEmoji') || '👋'; const adminName = sessionStorage.getItem('adminName') || 'Administrator';

      // Build last 6 months chart data from real bookings
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const now6 = new Date();
      const last6 = Array.from({length: 6}, (_, i) => { const d = new Date(now6.getFullYear(), now6.getMonth() - 5 + i, 1); return { label: monthNames[d.getMonth()], y: d.getFullYear(), m: d.getMonth() }; });
      const chartCounts = last6.map(mo => store.bookings.filter(b => { const d = new Date(b.createdAt || b.eventDate); return d.getMonth() === mo.m && d.getFullYear() === mo.y; }).length);

      const rawActivity = [
        ...store.bookings.slice(-15).map(b => ({ type: 'booking', date: new Date(b.createdAt || b.eventDate || Date.now()), item: b })),
        ...store.reviews.slice(-10).map(r => ({ type: 'review', date: new Date(r.createdAt || Date.now()), item: r }))
      ].sort((a, b) => b.date - a.date).slice(0, 8);
      const activityHtml = rawActivity.length === 0
        ? '<p class="p-6 text-center text-gray-500 text-sm">No recent activity yet</p>'
        : rawActivity.map(a => {
            const icon = a.type === 'booking' ? 'fa-calendar-check text-purple-400' : 'fa-star text-yellow-400';
            const bg = a.type === 'booking' ? 'bg-purple-600/20' : 'bg-yellow-600/20';
            const label = a.type === 'booking' ? escapeHtml(a.item.name || '') + ' — ' + escapeHtml(a.item.eventType || '') : escapeHtml(a.item.clientName || '') + ' left a review';
            const badge = a.type === 'booking' ? '<span class="badge-' + a.item.status + '">' + a.item.status + '</span>' : (a.item.isApproved ? '<span class="text-green-400 text-xs">Approved</span>' : '<span class="text-yellow-400 text-xs">Pending</span>');
            return '<div class="px-4 py-3 flex items-center gap-3 hover:bg-gray-800/50 transition"><div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ' + bg + '"><i class="fas ' + icon + ' text-xs"></i></div><div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">' + label + '</p><p class="text-xs text-gray-500 mt-0.5">' + a.date.toLocaleDateString() + ' &middot; ' + badge + '</p></div></div>';
          }).join('');

      // Upcoming events in next 30 days
      const nowDate = new Date();
      const in30 = new Date(nowDate.getTime() + 30 * 24 * 60 * 60 * 1000);
      const upcomingEvents = store.events
        .filter(e => { const d = new Date(e.date); return d >= nowDate && d <= in30 && e.status !== 'cancelled'; })
        .sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 5);
      const upcomingHtml = upcomingEvents.length === 0 ? '' : `
        <div class="bg-gray-900 rounded-2xl border border-orange-500/30 mb-6 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-800 flex items-center gap-3 bg-orange-500/5">
            <span class="w-2.5 h-2.5 bg-orange-400 rounded-full animate-pulse"></span>
            <h3 class="font-bold text-orange-300">⏰ Upcoming Events — Next 30 Days</h3>
            <span class="ml-auto text-xs bg-orange-500/20 text-orange-400 px-2.5 py-0.5 rounded-full font-semibold">${upcomingEvents.length} event${upcomingEvents.length > 1 ? 's' : ''} ahead</span>
          </div>
          <div class="divide-y divide-gray-800/70">
            ${upcomingEvents.map(e => {
              const ed = new Date(e.date);
              const days = Math.ceil((ed - nowDate) / 864e5);
              const urg = days <= 2 ? 'text-red-400 bg-red-500/10 border-red-500/30' : days <= 7 ? 'text-yellow-400 bg-yellow-500/10 border-yellow-500/30' : 'text-green-400 bg-green-500/10 border-green-500/30';
              const urgLabel = days === 0 ? '🔴 TODAY!' : days === 1 ? '🟡 Tomorrow' : `🟢 ${days} days`;
              return `<div class="px-6 py-3.5 flex items-center gap-4 hover:bg-gray-800/40 transition">
                <div class="text-center w-12 flex-shrink-0">
                  <p class="text-xs text-gray-500 uppercase">${ed.toLocaleDateString('en-KE',{month:'short'})}</p>
                  <p class="text-2xl font-black text-white leading-none">${ed.getDate()}</p>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="font-semibold text-white truncate">${escapeHtml(e.title)}</p>
                  <p class="text-xs text-gray-500 mt-0.5">${escapeHtml(e.venue)} · ${e.price ? 'KES ' + Number(e.price).toLocaleString() + '/ticket' : 'Custom Quote'}</p>
                </div>
                <span class="text-xs font-bold px-2.5 py-1 rounded-full border flex-shrink-0 ${urg}">${urgLabel}</span>
              </div>`;
            }).join('')}
          </div>
          <div class="px-6 py-3 bg-gray-800/20 flex items-center justify-between">
            <p class="text-xs text-gray-500">Prepare logistics, staff & equipment for these events</p>
            <button onclick="switchTab('events')" class="text-purple-400 text-xs hover:underline font-medium">Manage events →</button>
          </div>
        </div>`;

      // Revenue metrics
      const thisMonth = new Date(); const tm = thisMonth.getMonth(); const ty = thisMonth.getFullYear();
      const monthBookings = store.bookings.filter(b => { const d = new Date(b.createdAt || b.eventDate); return d.getMonth() === tm && d.getFullYear() === ty; });
      const monthRevEst = monthBookings.reduce((s, b) => { const m = {'10k-30k':20000,'30k-50k':40000,'50k-100k':75000,'100k-200k':150000,'200k+':250000}; return s + (m[b.budget]||0); }, 0);
      const activeServices = store.services.filter(s => s.isActive).length;

      container.innerHTML = `
      <!-- Welcome Banner -->
      <div class="welcome-banner rounded-2xl p-6 mb-6 border border-gray-800 bg-gradient-to-r from-gray-900 to-gray-900/80">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
          <div>
            <h2 class="text-2xl font-bold text-white">${greeting}, <span class="text-purple-400">${adminName}</span>! ${emoji}</h2>
            <p class="text-gray-400 mt-1 text-sm">Your business command centre — track, manage & grow.</p>
          </div>
          <div class="flex gap-3">
            <div class="bg-purple-600/20 rounded-xl px-4 py-2.5 text-center border border-purple-700/30">
              <p class="text-lg font-black text-purple-400">KES ${totalEstimatedValue.toLocaleString()}</p>
              <p class="text-xs text-gray-400">Total Pipeline</p>
            </div>

    function getEventStatusBadge(event) {
      const now = new Date().toISOString().split('T')[0];
      if (event.status === 'cancelled') return 'bg-red-600/20 text-red-400';
      if (event.date < now) return 'bg-gray-600/20 text-gray-400';
      if (event.seatsLeft === 0) return 'bg-orange-600/20 text-orange-400';
      if (event.isActive === false) return 'bg-yellow-600/20 text-yellow-400';
      return 'bg-green-600/20 text-green-400';
    }

    function getEventStatusText(event) {
      const now = new Date().toISOString().split('T')[0];
      if (event.status === 'cancelled') return 'Cancelled';
      if (event.date < now) return 'Completed';
      if (event.seatsLeft === 0) return 'Sold Out';
      if (event.isActive === false) return 'Draft';
      return 'Published';
    }

    function setEventView(mode) {
      eventViewMode = mode;
      renderEvents();
    }

    function editEvent(id) { openEventForm(id); }

    async function deleteEvent(id) {
      const result = await Swal.fire({ title: 'Delete event?', text: 'This action cannot be undone', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete', background: '#1e1e2a', color: '#fff' });
      if (result.isConfirmed) { store.events = store.events.filter(e => e.id !== id); await apiRequest('DELETE', `/api/admin/events/${id}`); renderEvents(); updateStats(); Swal.fire({ icon: 'success', title: 'Event deleted!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' }); }
    }

    // Duplicate an event (for quick creation of similar events)
    async function duplicateEvent(id) {
      const originalEvent = store.events.find(e => e.id === id);
      if (!originalEvent) return;
      
      const duplicatedEvent = {
        ...originalEvent,
        id: Date.now().toString(),
        title: `${originalEvent.title} (Copy)`,
        status: 'draft',
        isActive: false,
        seatsLeft: originalEvent.totalSeats,
        bookingCount: 0,
        createdAt: new Date().toISOString()
      };
      
      store.events.push(duplicatedEvent);
      await apiRequest('POST', '/api/admin/events', duplicatedEvent);
      renderEvents();
      
      Swal.fire({ icon: 'success', title: 'Event Duplicated!', text: 'You can now edit the copy', timer: 2000, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }

    // Export event data as CSV
    function exportEventData(id) {
      const event = store.events.find(e => e.id === id);
      if (!event) return;
      
      // Get bookings for this event (in production, fetch from database)
      const eventBookings = store.bookings.filter(b => b.eventId === id || b.eventType === event.title);
      
      const csvData = [
        ['Event Title', event.title],
        ['Event Date', new Date(event.date).toLocaleString()],
        ['Venue', event.venue],
        ['Ticket Price', `KES ${event.price.toLocaleString()}`],
        ['Total Seats', event.totalSeats || 'N/A'],
        ['Seats Sold', (event.totalSeats || event.seatsLeft || 0) - (event.seatsLeft || 0)],
        ['Revenue', `KES ${((event.totalSeats || event.seatsLeft || 0) - (event.seatsLeft || 0)) * event.price}`],
        ['Status', event.status || (event.isActive ? 'Active' : 'Inactive')],
        [''],
        ['Booking Details'],
        ['Name', 'Email', 'Phone', 'Ticket Type', 'Quantity', 'Amount']
      ];
      
      // Add individual bookings (placeholder for now)
      eventBookings.forEach(booking => {
        csvData.push([booking.name, booking.email, booking.phone, 'Standard', 1, `KES ${event.price}`]);
      });
      
      const csvContent = csvData.map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${event.title.replace(/[^a-z0-9]/gi, '_')}_report.csv`;
      a.click();
      URL.revokeObjectURL(url);
      
      Swal.fire({ icon: 'success', title: 'Export Started!', text: 'CSV file is being downloaded', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }

    async function saveEvent() {
      const title = document.getElementById('eventTitle').value;
      const date = document.getElementById('eventDate').value;
      const venue = document.getElementById('eventVenue').value;
      const price = parseInt(document.getElementById('eventPrice').value);
      const totalSeats = parseInt(document.getElementById('eventTotalSeats').value);
      const status = document.getElementById('eventStatus').value;
      const description = document.getElementById('eventDesc').value;
      const image = document.getElementById('eventImage').value;
      const isRecurring = document.getElementById('eventRecurring')?.checked || false;
      
      if (!title || !date || !venue || !price) {
        Swal.fire({ icon: 'error', title: 'Missing Fields', text: 'Please fill in all required fields', background: '#1e1e2a', color: '#fff' });
        return;
      }
      
      const seatsSold = currentEditId ? (store.events.find(e => e.id === currentEditId)?.totalSeats || totalSeats) - (store.events.find(e => e.id === currentEditId)?.seatsLeft || totalSeats) : 0;
      const seatsLeft = totalSeats - seatsSold;

      const payload = {
        title, date, venue, price, totalSeats, seatsLeft,
        description,
        image: image || 'https://placehold.co/400x300?text=' + encodeURIComponent(title),
        status,
        isActive: status !== 'draft' && status !== 'cancelled',
      };

      const result = await apiRequest(
        currentEditId ? 'PUT' : 'POST',
        currentEditId ? `/api/admin/events/${currentEditId}` : '/api/admin/events',
        payload
      );

      if (!result?.data) {
        Swal.fire({ icon: 'error', title: 'Failed to Save Event', text: result?._error ? result.message : 'Unexpected response from server', background: '#1e1e2a', color: '#fff' });
        return;
      }

      if (currentEditId) {
        store.events = store.events.map(e => e.id === currentEditId ? result.data : e);
        Swal.fire({ icon: 'success', title: 'Event Updated!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
      } else {
        store.events.push(result.data);

        // Save recurring events to DB individually
        if (isRecurring) {
          const recurringType = document.getElementById('recurringType').value;
          const recurringCount = parseInt(document.getElementById('recurringCount').value);
          let currentDate = new Date(date);
          for (let i = 1; i < recurringCount; i++) {
            if (recurringType === 'weekly') currentDate = new Date(currentDate.setDate(currentDate.getDate() + 7));
            else if (recurringType === 'monthly') currentDate = new Date(currentDate.setMonth(currentDate.getMonth() + 1));
            const recurPayload = { ...payload, date: currentDate.toISOString().slice(0, 16), title: `${title} (${recurringType === 'weekly' ? 'Week' : 'Month'} ${i + 1})`, seatsLeft: totalSeats };
            const recurResult = await apiRequest('POST', '/api/admin/events', recurPayload);
            if (recurResult?.data) store.events.push(recurResult.data);
          }
          Swal.fire({ icon: 'success', title: `Created ${recurringCount} recurring events!`, timer: 2000, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
        } else {
          Swal.fire({ icon: 'success', title: 'Event Created!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
        }
      }

      closeModal();
      renderEvents();
      updateStats();
    }

    function calcROI() {
      const price = parseFloat(document.getElementById('eventPrice')?.value) || 0;
      const seats = parseInt(document.getElementById('eventTotalSeats')?.value) || 0;
      const cost = parseFloat(document.getElementById('eventCost')?.value) || 0;
      const roi = document.getElementById('roiDisplay');
      if (!roi) return;
      if (price > 0 || cost > 0) {
        roi.style.display = 'block';
        const revenue = price * seats;
        const profit = revenue - cost;
        document.getElementById('roiRevenue').textContent = 'KES ' + revenue.toLocaleString();
        document.getElementById('roiCost').textContent = 'KES ' + cost.toLocaleString();
        const profitEl = document.getElementById('roiProfit');
        profitEl.textContent = 'KES ' + profit.toLocaleString();
        profitEl.className = 'text-lg font-bold ' + (profit >= 0 ? 'text-green-400' : 'text-red-400');
      } else {
        roi.style.display = 'none';
      }
    }

async function saveGalleryItem() {
    const titleInput = document.getElementById('galleryTitle');
    const categorySelect = document.getElementById('galleryCategory');
    const typeSelect = document.getElementById('galleryType');
    const fileInput = document.getElementById('galleryFile');
    
    if (!titleInput.value.trim()) { Swal.fire({ icon: 'error', title: 'Missing Title', text: 'Please enter a title', background: '#1e1e2a', color: '#fff' }); return; }
    if (!fileInput.files || !fileInput.files[0]) { Swal.fire({ icon: 'error', title: 'No File', text: 'Please select a file', background: '#1e1e2a', color: '#fff' }); return; }
    
    const file = fileInput.files[0];
    const title = titleInput.value;
    const category = categorySelect.value;
    const type = typeSelect.value;
    
    const progressArea = document.getElementById('uploadProgressArea');
    const progressBar = document.getElementById('uploadProgressBar');
    const percentSpan = document.getElementById('uploadPercent');
    const statusMsg = document.getElementById('uploadStatusMsg');
    
    if (progressArea) progressArea.classList.remove('hidden');
    if (statusMsg) statusMsg.textContent = 'Converting image...';
    
    const reader = new FileReader();
    let progress = 0;
    const interval = setInterval(() => {
        if (progress < 90) { progress += 10; if (progressBar) progressBar.style.width = progress + '%'; if (percentSpan) percentSpan.textContent = progress + '%'; }
    }, 100);
    
    reader.onload = function(e) {
        const imageUrl = e.target.result;
        if (statusMsg) statusMsg.textContent = 'Saving to gallery...';
        if (progressBar) progressBar.style.width = '100%';
        if (percentSpan) percentSpan.textContent = '100%';
        
        const newItem = { id: Date.now().toString(), title: title, category: category, type: type, imageUrl: imageUrl, createdAt: new Date().toISOString() };
        
        if (!store.gallery) store.gallery = [];
        store.gallery.unshift(newItem);
        apiRequest('POST', '/api/admin/gallery', newItem);
        closeModal();
        renderGallery();
        
        clearInterval(interval);
        if (progressArea) progressArea.classList.add('hidden');
        if (progressBar) progressBar.style.width = '0%';
        if (percentSpan) percentSpan.textContent = '0%';
        
        Swal.fire({ icon: 'success', title: 'Upload Complete!', text: `${title} has been added to gallery`, timer: 2000, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
        
        titleInput.value = '';
        fileInput.value = '';
    };
    
    reader.onerror = function() {
        Swal.fire({ icon: 'error', title: 'Upload Failed', text: 'Could not read file', background: '#1e1e2a', color: '#fff' });
        if (progressArea) progressArea.classList.add('hidden');
        clearInterval(interval);
        if (progressBar) progressBar.style.width = '0%';
        if (percentSpan) percentSpan.textContent = '0%';
    };
    
    reader.readAsDataURL(file);
}

async function saveMarketingBanner() {
    const payload = {
        type: 'banner',
        name: document.getElementById('bannerName').value || 'Unnamed',
        message: document.getElementById('bannerMessage').value,
        ctaText: document.getElementById('bannerCtaText').value,
        ctaLink: document.getElementById('bannerCtaLink').value,
        isActive: document.getElementById('bannerActive').checked,
        startDate: document.getElementById('bannerStartDate').value || null,
        endDate: document.getElementById('bannerEndDate').value || null,
        priority: 0
    };
    const result = await apiRequest('POST', '/api/admin/banners', payload);
    if (!result?.data) {
        const detail = result?._error ? result.message + (result.status ? ' (HTTP ' + result.status + ')' : '') : 'Unexpected response';
        Swal.fire({ icon: 'error', title: 'Failed to Save Banner', html: '<p>' + detail + '</p><p class="text-sm text-gray-400 mt-2">Check Vercel env vars: SUPABASE_URL, SUPABASE_SERVICE_KEY</p>', background: '#1e1e2a', color: '#fff' });
        return;
    }
    if (!store.marketingBanners) store.marketingBanners = [];
    store.marketingBanners.unshift(result.data);
    closeModal();
    renderMarketing();
    Swal.fire({ icon: 'success', title: 'Banner Created!', text: 'Your banner is now live on the homepage', timer: 2000, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
}

function toggleMarketingBanner(id) {
    if (!store.marketingBanners.find(b => b.id === id)) return;
    store.marketingBanners = store.marketingBanners.map(b => b.id === id ? { ...b, isActive: !b.isActive } : b);
    apiRequest('PATCH', `/api/admin/banners/${id}/toggle`);
    renderMarketing();
}

async function deleteMarketingBanner(id) {
    const result = await Swal.fire({ title: 'Delete banner?', text: 'This action cannot be undone', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete', background: '#1e1e2a', color: '#fff' });
    if (result.isConfirmed) {
        store.marketingBanners = store.marketingBanners.filter(b => b.id !== id);
        await apiRequest('DELETE', `/api/admin/banners/${id}`);
        renderMarketing();
        Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }
}

function duplicateMarketingBanner(id) {
    const original = store.marketingBanners.find(b => b.id === id);
    if (!original) return;
    
    const duplicated = {
        ...original,
        id: Date.now().toString(),
        name: `${original.name} (Copy)`,
        isActive: false,
        createdAt: new Date().toISOString()
    };
    
    store.marketingBanners.push(duplicated);
    apiRequest('POST', '/api/admin/banners', duplicated);
    renderMarketing();
    Swal.fire({ icon: 'success', title: 'Banner Duplicated!', text: 'Edit the copy to activate it', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
}

    // Poster media helpers
    function _isVideoUrl(url) {
      if (!url) return false;
      return /\.(mp4|webm|mov|ogg)(\?.*)?$/i.test(url) || /youtube\.com|youtu\.be|vimeo\.com/.test(url);
    }
    function _isYouTubeUrl(url) {
      return /youtube\.com\/watch\?v=|youtu\.be\//.test(url);
    }
    function _ytEmbedUrl(url) {
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
      return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=0` : url;
    }
    function setPosterType(type) {
      const isVid = type === 'video';
      document.getElementById('typeImage').className = `flex-1 py-2 rounded-lg border text-sm font-medium transition ${!isVid ? 'bg-purple-600 border-purple-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700'}`;
      document.getElementById('typeVideo').className = `flex-1 py-2 rounded-lg border text-sm font-medium transition ${isVid ? 'bg-purple-600 border-purple-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700'}`;
      const label = document.getElementById('mediaUrlLabel');
      const hint = document.getElementById('mediaHint');
      const input = document.getElementById('posterImageUrl');
      if (label) label.textContent = isVid ? 'Video URL *' : 'Image URL *';
      if (hint) hint.textContent = isVid ? '✓ YouTube link or direct .mp4/.webm URL' : '✓ Imgur, Google Drive direct link, or your CDN';
      if (input) input.placeholder = isVid ? 'https://youtube.com/watch?v=... or .mp4 link' : 'https://i.imgur.com/... or direct image URL';
      updatePosterPreview();
    }
    function updatePosterPreview() {

      if (!url) { preview.classList.add('hidden'); return; }

      if (isVid && isYT) {
        mediaHtml = `<iframe src="${_ytEmbedUrl(url)}" class="w-full h-44" frameborder="0" allowfullscreen></iframe>`;
      } else if (isVid) {

      } else {
        mediaHtml = `<img src="${url}" class="w-full max-h-44 object-cover" onerror="document.getElementById('posterPreviewBox').classList.add('hidden')">`;
      }

      preview.innerHTML = `<div class="bg-gray-800 px-3 py-1.5 text-xs text-gray-400 font-medium flex items-center gap-2"><span class="w-2 h-2 bg-green-400 rounded-full"></span>Live Preview</div><div class="relative bg-black">${mediaHtml}<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end p-3 pointer-events-none"><p class="text-white font-bold text-sm drop-shadow">${titleVal}</p></div></div>`;
      preview.classList.remove('hidden');
    }

    async function savePoster() {
      const title = document.getElementById('posterTitle').value;
      const imageUrl = document.getElementById('posterImageUrl').value;
      if (!title || !imageUrl) {
        Swal.fire({ icon: 'error', title: 'Missing Fields', text: 'Title and image URL are required', background: '#1e1e2a', color: '#fff' });
        return;
      }
      const payload = {
        title,
        imageUrl,
        caption: document.getElementById('posterCaption').value,
        startDate: document.getElementById('posterStartDate').value,
        endDate: document.getElementById('posterEndDate').value || null,
        displayOrder: parseInt(document.getElementById('posterOrder').value) || 1,
        isActive: document.getElementById('posterActive').checked,
      };

      const result = await apiRequest(
        currentEditId ? 'PUT' : 'POST',
        currentEditId ? `/api/admin/posters/${currentEditId}` : '/api/admin/posters',
        payload
      );

      if (!result?.data) {
        Swal.fire({ icon: 'error', title: 'Failed to Save Poster', text: result?._error ? result.message : 'Unexpected response from server', background: '#1e1e2a', color: '#fff' });
        return;
      }

      if (currentEditId) {
        store.posters = store.posters.map(p => p.id === currentEditId ? result.data : p);
      } else {
        store.posters.push(result.data);
      }

      closeModal();
      renderPosters();
      Swal.fire({ icon: 'success', title: currentEditId ? 'Poster Updated!' : 'Poster Added!', text: 'Changes are now live on the homepage', timer: 2000, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }

    async function togglePoster(id) {
      const poster = store.posters.find(p => p.id === id);
      if (!poster) return;
      store.posters = store.posters.map(p => p.id === id ? { ...p, isActive: !p.isActive } : p);
      await apiRequest('PATCH', `/api/admin/posters/${id}/toggle`);
      renderPosters();
    }

    async function deletePoster(id) {
      const result = await Swal.fire({ title: 'Delete poster?', text: 'This will remove it from the homepage', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete', background: '#1e1e2a', color: '#fff' });
      if (result.isConfirmed) {
        store.posters = store.posters.filter(p => p.id !== id);
        await apiRequest('DELETE', `/api/admin/posters/${id}`);
        renderPosters();
        Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
      }
    }
