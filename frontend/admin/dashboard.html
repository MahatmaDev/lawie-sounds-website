<body class="bg-gray-950 text-gray-200">

  <!-- ==================== SESSION CHECK ==================== -->
  <script>
    function getTimeBasedGreeting() {
      const hour = new Date().getHours();
      if (hour < 12) return { text: "Good Morning ☀️", emoji: "🌅" };
      if (hour < 17) return { text: "Good Afternoon 🌤️", emoji: "☀️" };
      if (hour < 21) return { text: "Good Evening 🌙", emoji: "✨" };
      return { text: "Good Night 🌟", emoji: "🌙" };
    }

    function checkAdminSession() {
      let session = localStorage.getItem('lawie_admin_session');
      if (!session) session = sessionStorage.getItem('lawie_admin_session');
      
      console.log('🔐 Session check - found:', session ? 'YES' : 'NO');
      
      if (!session) {
        console.log('❌ No session, redirecting to login');
        window.location.href = 'login.html';
        return false;
      }
      
      try {
        const sessionData = JSON.parse(atob(session));
        console.log('📋 Session data:', sessionData);
        
        if (sessionData.expires < Date.now()) {
          console.log('⏰ Session expired');
          localStorage.removeItem('lawie_admin_session');
          sessionStorage.removeItem('lawie_admin_session');
          window.location.href = 'login.html';
          return false;
        }
        
        // Store admin info
        const greeting = getTimeBasedGreeting();
        sessionStorage.setItem('adminName', sessionData.name || 'Administrator');
        sessionStorage.setItem('adminGreeting', greeting.text);
        sessionStorage.setItem('adminEmoji', greeting.emoji);
        
        console.log('✅ Session valid! Admin:', sessionData.name, '|', greeting.text);
        return true;
      } catch (e) {
        console.error('❌ Session parse error:', e);
        localStorage.removeItem('lawie_admin_session');
        sessionStorage.removeItem('lawie_admin_session');
        window.location.href = 'login.html';
        return false;
      }
    }
    
    checkAdminSession();
  </script>

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });

      const chartCanvas = document.getElementById('bookingsChart');
      if (chartCanvas) {
        if (bookingsChart) bookingsChart.destroy();
        bookingsChart = new Chart(chartCanvas, {
          type: 'line',
          data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ label: 'Bookings', data: [12, 19, 15, 27, 24, 32], borderColor: '#7c4dff', backgroundColor: 'rgba(124, 77, 255, 0.1)', fill: true, tension: 0.4 }] },

    // ==================== EMPLOYEE MANAGEMENT ====================
    function calculateLeaderboard(period = 'month') {
      const now = new Date();
      const employees = store.employees.map(emp => {
        const employeePayments = store.payroll.filter(p => p.employeeId === emp.id);
        
        let filteredPayments = employeePayments;
        if (period === 'month') {
          filteredPayments = employeePayments.filter(p => {
            const paymentDate = new Date(p.paymentDate);
            return paymentDate.getMonth() === now.getMonth() && paymentDate.getFullYear() === now.getFullYear();
          });
        } else if (period === 'year') {
          filteredPayments = employeePayments.filter(p => {
            const paymentDate = new Date(p.paymentDate);
            return paymentDate.getFullYear() === now.getFullYear();
          });
        }
        
        const totalRatings = filteredPayments.reduce((sum, p) => sum + (p.rating || 0), 0);
        const avgRating = filteredPayments.length > 0 ? totalRatings / filteredPayments.length : 0;
        const eventCount = filteredPayments.length;
        
        const score = (avgRating * 20) + (eventCount * 2);
        
        return { ...emp, score, avgRating, eventCount };
      });
      
      return employees.sort((a, b) => b.score - a.score);
    }

            <table class="w-full">
              <thead class="bg-gray-800/50">
                <tr><th class="px-4 py-3 text-left">Name</th><th class="px-4 py-3 text-left">Role</th><th class="px-4 py-3 text-left">Phone</th><th class="px-4 py-3 text-left">Events</th><th class="px-4 py-3 text-left">Rating</th><th class="px-4 py-3 text-left">Status</th><th class="px-4 py-3 text-left">Actions</th></tr>
              </thead>
              <tbody>
                ${store.employees.map(emp => `
                  <tr class="table-row border-t border-gray-800">
                    <td class="px-4 py-3">${escapeHtml(emp.name)}</td>
                    <td class="px-4 py-3">${escapeHtml(emp.role)}</td>
                    <td class="px-4 py-3">${escapeHtml(emp.phone)}</td>
                    <td class="px-4 py-3">${emp.totalEvents}</td>
                    <td class="px-4 py-3"><span class="text-yellow-400">${emp.avgRating} ⭐</span></td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${emp.status === 'active' ? 'bg-green-600/20 text-green-400' : 'bg-red-600/20 text-red-400'}">${emp.status}</span></td>
                    <td class="px-4 py-3"><button onclick="editEmployee('${emp.id}')" class="text-purple-400 mr-2">Edit</button><button onclick="deleteEmployee('${emp.id}')" class="text-red-400">Delete</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function openEmployeeForm(id = null) {
      currentEditId = id;
      const emp = id ? store.employees.find(e => e.id === id) : null;
      document.getElementById('modalTitle').textContent = id ? 'Edit Employee' : 'Add Employee';
      document.getElementById('modalForm').innerHTML = `
        <div><label class="block text-sm mb-1">Full Name *</label><input type="text" id="empName" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${escapeHtml(emp?.name || '')}" required></div>
        <div><label class="block text-sm mb-1">Role *</label><input type="text" id="empRole" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${escapeHtml(emp?.role || '')}" placeholder="e.g., Senior DJ, Sound Engineer" required></div>
        <div><label class="block text-sm mb-1">Phone</label><input type="tel" id="empPhone" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${escapeHtml(emp?.phone || '')}"></div>
        <div><label class="block text-sm mb-1">Email</label><input type="email" id="empEmail" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${escapeHtml(emp?.email || '')}"></div>
        <div><label class="block text-sm mb-1">Hire Date</label><input type="date" id="empHireDate" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${emp?.hireDate || ''}"></div>
        <div><label class="block text-sm mb-1">Status</label><select id="empStatus" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700"><option ${emp?.status === 'active' ? 'selected' : ''}>active</option><option ${emp?.status === 'inactive' ? 'selected' : ''}>inactive</option></select></div>
      `;
      document.getElementById('formModal').classList.remove('hidden');
    }

    function saveEmployee() {
      const newEmployee = {
        id: currentEditId || Date.now().toString(),
        name: document.getElementById('empName').value,
        role: document.getElementById('empRole').value,
        phone: document.getElementById('empPhone').value,
        email: document.getElementById('empEmail').value,
        hireDate: document.getElementById('empHireDate').value,
        status: document.getElementById('empStatus').value,
        totalEvents: currentEditId ? store.employees.find(e => e.id === currentEditId)?.totalEvents || 0 : 0,
        avgRating: currentEditId ? store.employees.find(e => e.id === currentEditId)?.avgRating || 0 : 0
      };
      if (currentEditId) {
        store.employees = store.employees.map(e => e.id === currentEditId ? newEmployee : e);
      } else {
        store.employees.push(newEmployee);
      }
      closeModal();
      renderEmployees();
      Swal.fire({ icon: 'success', title: 'Saved!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }

    async function deleteEmployee(id) {
      const result = await Swal.fire({ title: 'Delete employee?', text: 'This will remove all payroll records too', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete', background: '#1e1e2a', color: '#fff' });
      if (result.isConfirmed) {
        store.employees = store.employees.filter(e => e.id !== id);
        store.payroll = store.payroll.filter(p => p.employeeId !== id);
        renderEmployees();
        Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
      }
    }

    function editEmployee(id) {
      openEmployeeForm(id);
    }

    // ==================== PAYROLL MANAGEMENT ====================
    function renderPayroll() {
      const container = document.getElementById('sectionContent');
      const totalPaid = store.payroll.filter(p => p.status === 'paid').reduce((sum, p) => sum + p.amount, 0);
      const totalPending = store.payroll.filter(p => p.status === 'pending').reduce((sum, p) => sum + p.amount, 0);
      
      container.innerHTML = `
        <div class="grid md:grid-cols-3 gap-4 mb-8">
          <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
            <p class="text-gray-400 text-sm">Total Paid</p>
            <p class="text-2xl font-bold text-green-400">KES ${totalPaid.toLocaleString()}</p>
          </div>
          <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
            <p class="text-gray-400 text-sm">Pending Payments</p>
            <p class="text-2xl font-bold text-yellow-400">KES ${totalPending.toLocaleString()}</p>
          </div>
          <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
            <p class="text-gray-400 text-sm">Total Transactions</p>
            <p class="text-2xl font-bold text-white">${store.payroll.length}</p>
          </div>
        </div>
        
        <div class="flex justify-end mb-4"><button onclick="openPayrollForm()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition"><i class="fas fa-plus mr-2"></i>Add Payment</button></div>
        <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full payroll-table">
              <thead class="bg-gray-800/50">
                <tr><th class="px-4 py-3 text-left">Employee</th><th class="px-4 py-3 text-left">Event</th><th class="px-4 py-3 text-left">Date</th><th class="px-4 py-3 text-left">Amount</th><th class="px-4 py-3 text-left">Status</th><th class="px-4 py-3 text-left">Rating</th><th class="px-4 py-3 text-left">Actions</th></tr>
              </thead>
              <tbody>
                ${store.payroll.map(p => `
                  <tr class="table-row border-t border-gray-800">
                    <td class="px-4 py-3">${escapeHtml(p.employeeName)}</td>
                    <td class="px-4 py-3">${escapeHtml(p.eventName)}</td>
                    <td class="px-4 py-3">${new Date(p.eventDate).toLocaleDateString()}</td>
                    <td class="px-4 py-3">KES ${p.amount.toLocaleString()}</td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${p.status === 'paid' ? 'bg-green-600/20 text-green-400' : 'bg-yellow-600/20 text-yellow-400'}">${p.status}</span></td>
                    <td class="px-4 py-3"><span class="text-yellow-400">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</span></td>
                    <td class="px-4 py-3"><button onclick="editPayroll('${p.id}')" class="text-purple-400 mr-2">Edit</button><button onclick="deletePayroll('${p.id}')" class="text-red-400">Delete</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function openPayrollForm(id = null) {
      currentEditId = id;
      const payroll = id ? store.payroll.find(p => p.id === id) : null;
      document.getElementById('modalTitle').textContent = id ? 'Edit Payment' : 'Add Payment';
      document.getElementById('modalForm').innerHTML = `
        <div><label class="block text-sm mb-1">Employee *</label><select id="payrollEmployee" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" required>
          <option value="">Select Employee</option>
          ${store.employees.map(emp => `<option value="${emp.id}|${emp.name}" ${payroll?.employeeId === emp.id ? 'selected' : ''}>${emp.name} (${emp.role})</option>`).join('')}
        </select></div>
        <div><label class="block text-sm mb-1">Event Name *</label><input type="text" id="payrollEvent" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${escapeHtml(payroll?.eventName || '')}" required></div>
        <div><label class="block text-sm mb-1">Event Date *</label><input type="date" id="payrollDate" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${payroll?.eventDate || ''}" required></div>
        <div><label class="block text-sm mb-1">Amount (KES) *</label><input type="number" id="payrollAmount" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700" value="${payroll?.amount || ''}" required></div>
        <div><label class="block text-sm mb-1">Rating (1-5)</label><select id="payrollRating" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700"><option ${payroll?.rating === 5 ? 'selected' : ''}>5 - Excellent</option><option ${payroll?.rating === 4 ? 'selected' : ''}>4 - Very Good</option><option ${payroll?.rating === 3 ? 'selected' : ''}>3 - Good</option><option ${payroll?.rating === 2 ? 'selected' : ''}>2 - Fair</option><option ${payroll?.rating === 1 ? 'selected' : ''}>1 - Poor</option></select></div>
        <div><label class="block text-sm mb-1">Status</label><select id="payrollStatus" class="w-full px-4 py-2 bg-gray-800 rounded-lg border border-gray-700"><option ${payroll?.status === 'paid' ? 'selected' : ''}>paid</option><option ${payroll?.status === 'pending' ? 'selected' : ''}>pending</option></select></div>
      `;
      document.getElementById('formModal').classList.remove('hidden');
    }

    function savePayroll() {
      const employeeSelect = document.getElementById('payrollEmployee').value;
      const [empId, empName] = employeeSelect.split('|');
      const ratingMap = { '5 - Excellent': 5, '4 - Very Good': 4, '3 - Good': 3, '2 - Fair': 2, '1 - Poor': 1 };
      const ratingValue = ratingMap[document.getElementById('payrollRating').value] || 0;
      
      const newPayroll = {
        id: currentEditId || Date.now().toString(),
        employeeId: empId,
        employeeName: empName,
        eventName: document.getElementById('payrollEvent').value,
        eventDate: document.getElementById('payrollDate').value,
        amount: parseInt(document.getElementById('payrollAmount').value),
        status: document.getElementById('payrollStatus').value,
        paymentDate: document.getElementById('payrollStatus').value === 'paid' ? new Date().toISOString().split('T')[0] : null,
        rating: ratingValue
      };
      
      if (currentEditId) {
        store.payroll = store.payroll.map(p => p.id === currentEditId ? newPayroll : p);
      } else {
        store.payroll.push(newPayroll);
      }
      
      const employeePayments = store.payroll.filter(p => p.employeeId === empId && p.rating > 0);
      const totalRatings = employeePayments.reduce((sum, p) => sum + p.rating, 0);
      const avgRating = employeePayments.length > 0 ? totalRatings / employeePayments.length : 0;
      const totalEvents = employeePayments.length;
      
      store.employees = store.employees.map(e => e.id === empId ? { ...e, totalEvents, avgRating: parseFloat(avgRating.toFixed(1)) } : e);
      
      closeModal();
      renderPayroll();
      Swal.fire({ icon: 'success', title: 'Saved!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
    }

    async function deletePayroll(id) {
      const result = await Swal.fire({ title: 'Delete payment record?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete', background: '#1e1e2a', color: '#fff' });
      if (result.isConfirmed) {
        const deleted = store.payroll.find(p => p.id === id);
        store.payroll = store.payroll.filter(p => p.id !== id);
        const employeePayments = store.payroll.filter(p => p.employeeId === deleted.employeeId && p.rating > 0);
        const totalRatings = employeePayments.reduce((sum, p) => sum + p.rating, 0);
        const avgRating = employeePayments.length > 0 ? totalRatings / employeePayments.length : 0;
        const totalEvents = employeePayments.length;
        store.employees = store.employees.map(e => e.id === deleted.employeeId ? { ...e, totalEvents, avgRating: parseFloat(avgRating.toFixed(1)) } : e);
        renderPayroll();
        Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false, background: '#1e1e2a', color: '#fff' });
      }
    }

    function editPayroll(id) {
      openPayrollForm(id);
    }

    // ==================== UTILITIES ====================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active', 'border-purple-500', 'text-purple-400');
        btn.classList.add('border-transparent');
      });
      const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (activeBtn) {
        activeBtn.classList.add('tab-active', 'border-purple-500', 'text-purple-400');
        activeBtn.classList.remove('border-transparent');
      }
      
      if (tab === 'dashboard') renderDashboard();
      else if (tab === 'events') renderEvents();
      else if (tab === 'gallery') renderGallery();
      else if (tab === 'reviews') renderReviews();
      else if (tab === 'marketing') renderMarketing();
      else if (tab === 'bookings') renderBookings();
      else if (tab === 'employees') renderEmployees();
      else if (tab === 'payroll') renderPayroll();
    }

    function closeModal() {
      document.getElementById('formModal').classList.add('hidden');
      currentEditId = null;
    }

    function logout() {
      localStorage.removeItem('lawie_admin_session');
      sessionStorage.removeItem('lawie_admin_session');
      localStorage.removeItem('adminName');
      sessionStorage.removeItem('adminName');
      sessionStorage.removeItem('adminGreeting');
      sessionStorage.removeItem('adminEmoji');
      window.location.href = 'login.html';
    }

    // ==================== INITIALIZE ====================
    function init() {
      updateStats();
      updateGreetingDisplay();
      switchTab('dashboard');
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      
      const closeBtn = document.getElementById('closeModalBtn');
      const cancelBtn = document.getElementById('cancelModalBtn');
      const saveBtn = document.getElementById('saveModalBtn');
      
      if (closeBtn) closeBtn.addEventListener('click', closeModal);
      if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
      if (saveBtn) {
        saveBtn.addEventListener('click', () => {
          if (document.getElementById('eventTitle')) saveEvent();
          else if (document.getElementById('galleryTitle')) saveGallery();
          else if (document.getElementById('bannerMessage')) saveMarketing();
          else if (document.getElementById('empName')) saveEmployee();
          else if (document.getElementById('payrollEmployee')) savePayroll();
        });
      }
      
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) logoutBtn.addEventListener('click', logout);
    }
    
    init();

    window.switchTab = switchTab;
    window.openEventForm = openEventForm;
    window.editEvent = openEventForm;
    window.deleteEvent = deleteEvent;
    window.openGalleryForm = openGalleryForm;
    window.deleteImage = deleteImage;
    window.approveReview = approveReview;
    window.deleteReview = deleteReview;
    window.openMarketingForm = openMarketingForm;
    window.toggleBanner = toggleBanner;
    window.deleteBanner = deleteBanner;
    window.updateBookingStatus = updateBookingStatus;
    window.viewBookingDetails = viewBookingDetails;
    window.openEmployeeForm = openEmployeeForm;
    window.editEmployee = editEmployee;
    window.deleteEmployee = deleteEmployee;
    window.openPayrollForm = openPayrollForm;
    window.editPayroll = editPayroll;
    window.deletePayroll = deletePayroll;
  </script>

  <style>
    .badge-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
    .badge-confirmed { background: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
    .badge-completed { background: rgba(59, 130, 246, 0.2); color: #3b82f6; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
    .badge-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
  </style>
</body>
</html>
