<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Login | Lawie Sounds</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeInUp 0.5s ease forwards; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 0.8s linear infinite; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    
    .gradient-border {
      position: relative;
      background: linear-gradient(135deg, #1e1e2a 0%, #2d2d3a 100%);
      border-radius: 1.5rem;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, #7c4dff, #b87cff, #7c4dff);
      border-radius: 1.5rem;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .gradient-border:hover::before { opacity: 1; }
    
    .input-focus:focus {
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
      border-color: #7c4dff;
    }
    
    .password-toggle { cursor: pointer; transition: color 0.2s; }
    .password-toggle:hover { color: #7c4dff; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #7c4dff; border-radius: 3px; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 min-h-screen flex items-center justify-center p-4">

  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-pink-600/20 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md animate-fade-up">
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-2xl mb-4">
        <img src="/IMAGES/LOGO/2.jpg" alt="Lawie Sounds" class="w-20 h-20 rounded-full border-2 border-purple-500 shadow-xl object-cover" onerror="this.src='https://placehold.co/80x80?text=LS'">
      </div>
      <h1 class="text-2xl font-bold text-white">LAWIE <span class="text-purple-400">SOUNDS</span></h1>
      <p class="text-gray-400 text-sm mt-2">Admin Control Panel</p>
    </div>

    <div class="gradient-border p-8 bg-gray-900/90 backdrop-blur-sm shadow-2xl">
      <div class="text-center mb-6">
        <i class="fas fa-shield-alt text-4xl text-purple-400 mb-2"></i>
        <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
        <p class="text-gray-400 text-sm mt-1">Enter your credentials to continue</p>
      </div>

      <!-- Server status bar -->
      <div id="serverStatus" class="hidden mb-4 px-3 py-2 rounded-lg text-xs flex items-center gap-2"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-user mr-2 text-purple-400"></i>Username
          </label>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="username" name="username" 
                   class="w-full pl-11 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 input-focus transition"
                   placeholder="admin" autocomplete="username" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-lock mr-2 text-purple-400"></i>Password
          </label>
          <div class="relative">
            <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
            <input type="password" id="password" name="password" 
                   class="w-full pl-11 pr-12 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 input-focus transition"
                   placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" id="togglePassword" class="password-toggle absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-purple-400">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="flex justify-between items-center">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-700 bg-gray-800 text-purple-500">
            <span class="text-sm text-gray-400">Remember me</span>
          </label>
          <a href="#" id="forgotPassword" class="text-sm text-purple-400 hover:text-purple-300 transition">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-lg flex items-center justify-center gap-2">
          <i class="fas fa-sign-in-alt"></i>
          <span>Login to Dashboard</span>
        </button>

        <div class="flex justify-center gap-4 pt-2">
          <span class="text-xs text-gray-500"><i class="fas fa-lock mr-1"></i> 256-bit SSL</span>
          <span class="text-xs text-gray-500"><i class="fas fa-shield-alt mr-1"></i> 2FA Ready</span>
          <span class="text-xs text-gray-500"><i class="fas fa-clock mr-1"></i> Session Timeout</span>
        </div>
      </form>
    </div>

    <div class="text-center mt-6">
      <p class="text-xs text-gray-500">&copy; 2026 Lawie Sounds. <a href="../index.html" class="text-purple-400 hover:text-purple-300 transition">← Back to Website</a></p>
    </div>
  </div>

  <script>
    let loginAttempts = 0;
    let lockoutTime = 0;
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_DURATION = 15 * 60 * 1000;

    const SWAL_DEFAULTS = { background: '#1e1e2a', color: '#fff', confirmButtonColor: '#7c4dff' };

    function showLoading(show) {
      const btn = document.getElementById('loginBtn');
      if (!btn) return;
      if (show) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> <span>Authenticating...</span>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Login to Dashboard</span>';
      }
    }

    function setCookie(name, value, days) {
      const expires = new Date();
      expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/;SameSite=Lax`;
    }

    function deleteCookie(name) {
      document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
    }

    function triggerShake() {
      const formCard = document.querySelector('.gradient-border');
      if (formCard) {
        formCard.classList.add('animate-shake');
        setTimeout(() => formCard.classList.remove('animate-shake'), 300);
      }
    }

    function setServerStatus(type, msg) {
      const el = document.getElementById('serverStatus');
      if (!el) return;
      el.classList.remove('hidden');
      const styles = {
        ok:   'bg-green-900/40 border border-green-700/50 text-green-300',
        warn: 'bg-yellow-900/40 border border-yellow-700/50 text-yellow-300',
        err:  'bg-red-900/40 border border-red-700/50 text-red-300',
      };
      const icons = { ok: 'fa-circle-check', warn: 'fa-triangle-exclamation', err: 'fa-circle-xmark' };
      el.className = `mb-4 px-3 py-2 rounded-lg text-xs flex items-center gap-2 ${styles[type] || styles.warn}`;
      el.innerHTML = `<i class="fas ${icons[type] || icons.warn}"></i><span>${msg}</span>`;
    }

    async function checkServerHealth() {
      try {
        const [healthRes, configRes] = await Promise.all([
          fetch('/api/health', { signal: AbortSignal.timeout(5000) }),
          fetch('/api/admin/auth/config', { signal: AbortSignal.timeout(5000) })
        ]);
        if (!healthRes.ok) { setServerStatus('err', 'Server is unreachable — contact your developer.'); return; }
        const cfg = configRes.ok ? await configRes.json().catch(() => ({})) : {};
        if (cfg.adminConfigured === false) {
          setServerStatus('warn', 'Admin credentials are not configured on this server. Contact your developer.');
        }
      } catch {
        setServerStatus('err', 'Cannot reach the server. Check your internet connection.');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();

      const username  = document.getElementById('username')?.value.trim() || '';
      const password  = document.getElementById('password')?.value || '';
      const rememberMe = document.getElementById('rememberMe')?.checked || false;

      if (!username || !password) {
        Swal.fire({ ...SWAL_DEFAULTS, icon: 'warning', title: 'Missing Fields', text: 'Please enter both username and password.' });
        triggerShake();
        return;
      }

      if (lockoutTime > Date.now()) {
        const mins = Math.ceil((lockoutTime - Date.now()) / 60000);
        Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Account Locked', text: `Too many failed attempts. Try again in ${mins} minute${mins > 1 ? 's' : ''}.` });
        return;
      }

      showLoading(true);

      try {
        const res  = await fetch('/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          signal: AbortSignal.timeout(10000)
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          loginAttempts++;
          showLoading(false);
          triggerShake();

          if (res.status === 429) {
            lockoutTime = Date.now() + LOCKOUT_DURATION;
            Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Too Many Attempts', text: data.error || 'Rate limited. Please wait 15 minutes before trying again.' });
          } else if (res.status === 401) {
            const remaining = MAX_ATTEMPTS - loginAttempts;
            if (loginAttempts >= MAX_ATTEMPTS) {
              lockoutTime = Date.now() + LOCKOUT_DURATION;
              Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Account Locked', text: 'Too many failed attempts. Locked for 15 minutes.' });
            } else {
              const hint = data.error ? `${data.error}` : 'Incorrect username or password.';
              Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Login Failed', text: `${hint} ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.` });
            }
          } else if (res.status >= 500) {
            const detail = data.error || data.message || `Server error (${res.status})`;
            Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Server Error', text: `${detail} — Please try again or contact your developer.` });
          } else {
            Swal.fire({ ...SWAL_DEFAULTS, icon: 'error', title: 'Login Failed', text: data.error || data.message || `Unexpected error (HTTP ${res.status}).` });
          }
          return;
        }

        loginAttempts = 0;
        const token = data.token;
        const user  = data.user || {};

        if (rememberMe) {
          localStorage.setItem('lawie_admin_session', token);
          setCookie('lawie_admin_session', token, 30);
          localStorage.setItem('lawie_remembered_user', username);
        } else {
          sessionStorage.setItem('lawie_admin_session', token);
        }

        Swal.fire({
          ...SWAL_DEFAULTS,
          icon: 'success',
          title: 'Login Successful!',
          text: `Welcome back, ${user.name || 'Administrator'}`,
          timer: 1500,
          showConfirmButton: false
        }).then(() => { window.location.href = 'dashboard.html'; });

      } catch (err) {
        showLoading(false);
        triggerShake();
        const isTimeout = err?.name === 'TimeoutError' || err?.name === 'AbortError';
        Swal.fire({
          ...SWAL_DEFAULTS,
          icon: 'error',
          title: isTimeout ? 'Request Timed Out' : 'Connection Error',
          text: isTimeout
            ? 'The server took too long to respond. Check your internet connection and try again.'
            : 'Cannot reach the server. Check your internet connection.'
        });
      }
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('password');
      const icon  = document.querySelector('#togglePassword i');
      if (!input || !icon) return;
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.classList.toggle('fa-eye', !isHidden);
      icon.classList.toggle('fa-eye-slash', isHidden);
    }

    function handleForgotPassword(e) {
      e.preventDefault();
      Swal.fire({ ...SWAL_DEFAULTS, title: 'Reset Password', text: 'Contact the system administrator to reset your password.' });
    }

    // Clear any existing session on login page load
    localStorage.removeItem('lawie_admin_session');
    sessionStorage.removeItem('lawie_admin_session');
    deleteCookie('lawie_admin_session');

    // Load remembered username
    const rememberedUser = localStorage.getItem('lawie_remembered_user');
    if (rememberedUser) {
      document.getElementById('username').value = rememberedUser;
      document.getElementById('rememberMe').checked = true;
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('togglePassword').addEventListener('click', togglePasswordVisibility);
    document.getElementById('forgotPassword').addEventListener('click', handleForgotPassword);
    document.getElementById('username').focus();

    // Check server health quietly in background
    checkServerHealth();
  </script>
</body>
</html>
