    * { font-family: 'Inter', sans-serif; }
    
    @keyframes fadeInUp {

    }
    .animate-fade-up { animation: fadeInUp 0.5s ease forwards; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }

          { icon: "fa-microphone", title: "Wireless Mics", desc: "4 wireless microphones" },
          { icon: "fa-user-cog", title: "Sound Engineer", desc: "Professional on-site" },
          { icon: "fa-users", title: "Large Coverage", desc: "Up to 5000 pax" }
        ],
        faqs: [
          { q: "Can you handle outdoor events?", a: "Yes, systems designed for indoor/outdoor." },
          { q: "Do you provide a sound check?", a: "Yes, we arrive early for full sound testing." }
        ],
        testimonials: []
      }
    };

    // ==================== PAGE RENDERER ====================
    function getServiceFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('service') || 'dj-mc-services';
    }

    async function renderServicePage() {
      const slug = getServiceFromUrl();
      let service = null;

      try {
        const res = await fetch('/api/services');
        if (res.ok) {
          const json = await res.json();
          service = (json.data || []).find(s => s.slug === slug || s.id === slug);
        }
      } catch {}

      if (!service) service = SERVICES_DATA[slug];

      if (!service) {
        window.location.href = 'services.html';
        return;
      }

      document.title = `${service.name} | LAWIE SOUNDS`;
      document.getElementById('metaDescription').setAttribute('content', service.shortDesc || service.short_desc || '');

      const container = document.getElementById('serviceContent');
      const packages = service.packages || [];
      const features = service.features || [];
      const galleryImages = service.galleryImages || service.gallery_images || [];
      const testimonials = service.testimonials || [];
      const faqs = service.faqs || [];
      const mainImage = service.mainImage || service.main_image || 'https://placehold.co/600x400';
      const icon = service.icon || 'fa-star';
      const longDesc = service.longDesc || service.long_desc || service.shortDesc || service.short_desc || '';

      container.innerHTML = `
        <section class="relative bg-gradient-to-r from-gray-900 to-black text-white py-12">
          <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center gap-8">
              <div class="flex-1 text-center md:text-left">
                <div class="flex flex-wrap gap-2 justify-center md:justify-start mb-4">
                  <span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-bold">✅ 500+ Events</span>
                  <span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-bold">✅ 98% Satisfaction</span>
                  <span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-bold">✅ Professional Team</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-bold mb-4"><span class="text-yellow-400">${service.name}</span></h1>
                <p class="text-gray-300 text-lg mb-6">${longDesc}</p>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                  <a href="booking.html?service=${slug}" class="bg-yellow-400 text-black px-6 py-3 rounded-full font-bold hover:bg-yellow-300 transition shadow-lg btn-touch">
                    <i class="fas fa-envelope mr-2"></i>Request a Custom Quote
                  </a>
                  <a href="https://wa.me/254703925826?text=Hi%20Lawie%20Sounds!%20I%27m%20interested%20in%20${encodeURIComponent(service.name)}" target="_blank" class="border-2 border-white px-6 py-3 rounded-full font-bold hover:bg-white hover:text-black transition btn-touch">
                    <i class="fab fa-whatsapp mr-2"></i>Chat Now
                  </a>
                </div>
              </div>
              <div class="flex-1">
                <img src="${mainImage}" alt="${service.name}" class="rounded-2xl shadow-2xl w-full max-h-80 object-cover" onerror="this.src='https://placehold.co/600x400'">
              </div>
            </div>
          </div>
        </section>

        ${packages.length ? `
        <section id="packages" class="py-16 bg-white">
          <div class="container mx-auto px-4">
            <div class="text-center mb-12">
              <span class="text-yellow-600 font-bold uppercase tracking-wider">What We Offer</span>
              <h2 class="text-3xl font-bold mt-2">Service Packages</h2>
              <p class="text-gray-500 mt-2">Each package is tailored to your event. Get in touch for a custom quote.</p>
              <div class="w-20 h-1 bg-yellow-400 mx-auto mt-4"></div>
            </div>
            <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
              ${packages.map(pkg => `
                <div class="price-card border ${pkg.popular ? 'border-yellow-400 shadow-xl relative' : 'border-gray-200'} rounded-xl p-6 text-center hover:shadow-xl transition bg-white">
                  ${pkg.popular ? '<div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-black px-4 py-1 rounded-full text-xs font-bold animate-pulse-slow">🔥 MOST POPULAR</div>' : ''}
                  <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas ${icon} text-2xl text-yellow-600"></i>
                  </div>
                  <h3 class="text-xl font-bold mb-2">${pkg.name}</h3>
                  <p class="text-sm text-gray-500 mb-4">${pkg.duration}</p>
                  <ul class="text-sm text-left space-y-2 mb-6">
                    ${pkg.features.map(f => `<li class="flex items-center gap-2"><i class="fas fa-check-circle text-green-500 w-4"></i> ${f}</li>`).join('')}
                  </ul>
                  <a href="booking.html?service=${slug}&package=${encodeURIComponent(pkg.name)}" class="block ${pkg.popular ? 'bg-yellow-400 text-black' : 'bg-gray-800 text-white hover:bg-yellow-400 hover:text-black'} py-2 rounded-full font-semibold transition btn-touch">
                    <i class="fas fa-envelope mr-1"></i> Request This Package
                  </a>
                </div>
              `).join('')}
            </div>
            <p class="text-center text-sm text-gray-500 mt-6">
              <i class="fas fa-gem text-yellow-500 mr-1"></i> Not sure which package fits? <a href="booking.html?service=${slug}" class="text-yellow-600 underline font-semibold">Let's build a custom package together</a>
            </p>
          </div>
        </section>` : ''}

        <section class="py-16 bg-gray-100">
          <div class="container mx-auto px-4">
            <div class="text-center mb-12">
              <span class="text-yellow-600 font-bold uppercase tracking-wider">Why Choose Us</span>
              <h2 class="text-3xl font-bold mt-2">What's Included</h2>
              <div class="w-20 h-1 bg-yellow-400 mx-auto mt-4"></div>
            </div>
            <div class="grid md:grid-cols-4 gap-6">
              ${features.map(f => `
                <div class="feature-card bg-white p-6 rounded-xl text-center shadow-md">
                  <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas ${f.icon} text-2xl text-yellow-600"></i>
                  </div>
                  <h3 class="text-lg font-bold mb-2">${f.title}</h3>
                  <p class="text-gray-600 text-sm">${f.desc}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section id="gallery" class="py-16 bg-white">
          <div class="container mx-auto px-4">
            <div class="text-center mb-12">
              <span class="text-yellow-600 font-bold uppercase tracking-wider">Moments Captured</span>
              <h2 class="text-3xl font-bold mt-2">Service Gallery</h2>
              <div class="w-20 h-1 bg-yellow-400 mx-auto mt-4"></div>
            </div>
            <div id="lightgallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
              ${galleryImages.map(img => `
                <a href="${img}" class="rounded-xl overflow-hidden shadow-md gallery-item">
                  <img src="${img}" class="w-full h-56 object-cover transition hover:scale-105 duration-300" onerror="this.src='https://placehold.co/400x300'">
                </a>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="py-16 bg-gray-100">
          <div class="container mx-auto px-4">
            <div class="text-center mb-12">
              <span class="text-yellow-600 font-bold uppercase tracking-wider">Client Love</span>
              <h2 class="text-3xl font-bold mt-2">What Our Clients Say</h2>
              <div class="w-20 h-1 bg-yellow-400 mx-auto mt-4"></div>
            </div>
            <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
              ${testimonials.map(t => `
                <div class="bg-white p-6 rounded-xl shadow-md">
                  <div class="flex text-yellow-400 mb-3">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</div>
                  <p class="text-gray-600 text-sm italic">"${t.comment}"</p>
                  <div class="mt-4 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-500"></i></div>
                    <div><p class="font-semibold text-sm">${t.clientName}</p><p class="text-xs text-gray-400">${t.eventType}</p></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="py-16 bg-white">
          <div class="container mx-auto px-4 max-w-3xl">
            <div class="text-center mb-12">
              <span class="text-yellow-600 font-bold uppercase tracking-wider">Common Questions</span>
              <h2 class="text-3xl font-bold mt-2">Frequently Asked Questions</h2>
              <div class="w-20 h-1 bg-yellow-400 mx-auto mt-4"></div>
            </div>
            <div class="space-y-4">
              ${faqs.map((faq, idx) => `
                <div class="border rounded-xl p-4 cursor-pointer hover:bg-gray-50 transition" onclick="this.querySelector('.faq-answer-${idx}').classList.toggle('hidden')">
                  <div class="flex justify-between items-center"><h3 class="font-semibold">${faq.q}</h3><i class="fas fa-chevron-down text-yellow-500"></i></div>
                  <div class="faq-answer-${idx} hidden mt-2 text-gray-600 text-sm">${faq.a}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="py-20 bg-gradient-to-r from-gray-900 to-black text-white text-center">
          <div class="container mx-auto px-4">
            <div class="inline-block bg-yellow-400 text-black px-4 py-1 rounded-full text-sm font-bold mb-4 animate-pulse-slow">⏰ Limited Availability - Book Early!</div>
            <h2 class="text-3xl md:text-4xl font-bold mb-4">Ready to Book ${service.name}?</h2>
            <p class="text-gray-300 mb-8 max-w-xl mx-auto">Get a custom quote for your event. We respond within <strong class="text-yellow-400">2 hours</strong>.</p>
            <div class="flex flex-wrap gap-4 justify-center">
              <a href="booking.html?service=${slug}" class="bg-yellow-400 text-black px-8 py-3 rounded-full font-bold hover:bg-yellow-300 transition shadow-lg btn-touch"><i class="fas fa-calendar-check mr-2"></i>Request Quote</a>
              <a href="https://wa.me/254703925826" target="_blank" class="border-2 border-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-black transition btn-touch"><i class="fab fa-whatsapp mr-2"></i>Chat on WhatsApp</a>
            </div>
          </div>
        </section>
      `;
      
      if (typeof lightGallery !== 'undefined' && document.getElementById('lightgallery')) {
        lightGallery(document.getElementById('lightgallery'), { plugins: [lgZoom, lgThumbnail], speed: 500 });
      }
    }

    // ==================== INITIALIZE ====================
    document.addEventListener('DOMContentLoaded', async () => {
      await renderServicePage();
      document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
        document.getElementById('mobile-menu').classList.toggle('hidden');
      });
    });
  </script>
</body>
</html>
